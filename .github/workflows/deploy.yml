name: Pages Deployment

on:
  push:
    branches: [main]
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Build and Deploy
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: package.json
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install rage
        run: |
          curl -fsSL https://github.com/str4d/rage/releases/download/v0.11.1/rage-v0.11.1-x86_64-linux.tar.gz \
            | sudo tar -xz -C /usr/local/bin --strip-components=1 rage/rage
          rage --version

      - name: Decrypt fonts
        env:
          RAGE_IDENTITY: ${{ secrets.RAGE_IDENTITY }}
        run: |
          umask 077
          KEY="$(mktemp)"
          printf '%s\n' "$RAGE_IDENTITY" > "$KEY"
          ./scripts/fonts-decrypt.sh "$KEY"
          rm -f "$KEY"

      - name: Build
        run: pnpm build
        env:
          GITHUB_TOKEN: ${{ secrets.SPONSORS_TOKEN }}

      - name: Upload artifact for deployment
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
